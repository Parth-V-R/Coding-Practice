<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function interest(p,r,...nums)
        {
            for(n of nums)
            {
                var si=p*r*n/100
                document.write(`Simple Interest for ${n} year is `+si+"<br>")
            }
        }

        interest(5000,12.5,1,2,3,5,7,10,15,20,25)
    </script>
</body>
</html>
