
<html>
    <body>
        <img src="" id="image" height="150" width="200">
        <br>
        <br>
        <button onclick="ChangeIndia()">India</button>
        <button onclick="ChangeRussia()">Russia</button>
        <button onclick="ChangeIsrael()">Israel</button>
    </body>
</html>
    <script>
        var img=document.getElementById("image")
        function ChangeIndia(){
            img.src="images/india.png"
        }
        function ChangeRussia(){
            img.src="images/russia.png"
        }
        function ChangeIsrael(){
            img.src="images/israel.png"
        }
    </script>
