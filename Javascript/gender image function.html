<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function gendericon(gen)
        {
            if(gen=="M")
              document.write("<img src=images/male.png height=100>"+"<br>")

            else
              document.write("<img src=images/female.png height=100>"+"<br>")
        }
        gendericon("M")
    </script>
</body>
</html>
