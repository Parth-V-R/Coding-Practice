<html>
    <body>
        <img src="" id="image" height="150" width="200">
        <br>
        <button onclick="ChangeImage('images/india.png')">India</button>
        <button onclick="ChangeImage('images/russia.png')">Russia</button>
        <button onclick="ChangeImage('images/israel.png')">Israel</button>
        <button onclick="ChangeImage('images/japan.png')">Japan</button>
    </body>
</html>
<script>
    var img=document.getElementById('image')
    function ChangeImage(name){
        img.src=name
    }
</script>
