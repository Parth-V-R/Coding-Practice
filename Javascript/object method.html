<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a={
            name:"Raja",
            wages:500,
            wdays:7,
            payment:function()
            {
                p=this.wages*this.wdays
                return p
            }
        }
        document.write(`Name is ${a.name}<br>Wages is ${a.wages}<br>Wdays are ${a.wdays}<br>Payment is ${a.payment()}`)
    </script>
</body>
</html>
