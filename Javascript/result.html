<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function result(r,n,...marks)
        {
            var T=0
            for(a of marks)
            {
                T=T+a
            }
            document.write(`Roll No is ${r}<br>Name is ${n}<br>Total is ${T}`)
        }
        result(1,"Parth",40,60,70,30,50,50,100,100)
    </script>
</body>
</html>
