<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function sum(...values)
        {
            var s=0
            for(n of values)
                {
                    s=s+n
                }
                document.write("Sum is "+s+ "<br>")
        }
        sum(2,3,5)
        sum(2,8,4,1,6)
        sum(10,20,30,40,50,60,70)
    </script>
</body>
</html>
