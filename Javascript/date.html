<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var cdate=new Date()
        var d=cdate.getDate()
        var m=cdate.getMonth()
        var y=cdate.getFullYear()
        var h=cdate.getHours()
        var mn=cdate.getMinutes()
        var s=cdate.getSeconds()
        document.write(`Current date is ${d}-${m}-${y}`)
        document.write(`<br>Time: ${h%24}:${mn}:${s}`)
    </script>
</body>
</html>
