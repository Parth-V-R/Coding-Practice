<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class worker
        {
            constructor(n,w,d)
            {
                this.name=n
                this.wages=w
                this.wdays=d
            }
            payment()
            {
                var p=this.wages*this.wdays
                return p
            }
        }
        var arr=[
        new worker("Amit",500,5),
        new worker("Sumit",700,5),
        new worker("Gopal",300,9),
        new worker("Raj",400,2)
        ]
        var s=0
        document.write("<table border=1>")
            document.write("<tr><th>Name</th><th>Wages</th><th>Wdays</th><th>Payment</th></tr>")
            for(item of arr)
            {
                document.write(`<tr><td>${item.name}</td>`)
                document.write(`<td>${item.wages}</td>`)
                document.write(`<td>${item.wdays}</td>`)
                document.write(`<td>${item.payment()}</td></tr>`)
                s=s+item.payment()
            }
            document.write("</table>")
        document.write(`Total Payment is ${s}`)
    </script>
</body>
</html>
