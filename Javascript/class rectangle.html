<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Rectangle
        {
            constructor(l,b)
            {
                this.L=l
                this.B=b
            }
            area()
            {
                let A=this.L*this.B
                document.write(`Area is ${A}<br>`)
            }
            perimeter()
            {
                let P=2*(this.L+this.B)
                document.write(`Perimeter is ${P}<br>`)
            }
        }
        var r=new Rectangle(5,7)
        r.area()
        r.perimeter()
    </script>
</body>
</html>
